<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Order Form</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f0ece4;
        font-family: "Source Sans 3", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .form-wrapper {
        background: #fff;
        border: 2px solid #1a3a6b;
        width: 100%;
        max-width: 560px;
        box-shadow: 4px 4px 0 #1a3a6b;
      }

      .form-title {
        font-family: "Playfair Display", serif;
        color: #6b1a4a;
        text-align: center;
        font-size: 1.5rem;
        padding: 16px 20px 14px;
        border-bottom: 2px solid #1a3a6b;
        letter-spacing: 0.02em;
      }

      .field-row {
        display: flex;
        align-items: stretch;
        border-bottom: 1px solid #1a3a6b;
      }

      .field-row label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #1a1a1a;
        padding: 9px 14px;
        min-width: 130px;
        display: flex;
        align-items: center;
      }

      .field-row input[type="text"] {
        flex: 1;
        border: none;
        border-left: 1px solid #1a3a6b;
        padding: 9px 12px;
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.85rem;
        outline: none;
        background: transparent;
      }

      .field-row input[type="text"]:focus {
        background: #f5f8ff;
      }

      /* Product table */
      .product-table {
        width: 100%;
        border-collapse: collapse;
      }

      .product-table thead tr {
        border-bottom: 2px solid #1a3a6b;
      }

      .product-table th {
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.82rem;
        font-weight: 700;
        color: #1a1a1a;
        padding: 9px 10px;
        text-align: left;
        border-right: 1px solid #1a3a6b;
      }

      .product-table th:last-child {
        border-right: none;
      }

      .product-table td {
        border-right: 1px solid #1a3a6b;
        border-bottom: 1px solid #1a3a6b;
        padding: 0;
      }

      .product-table td:last-child {
        border-right: none;
      }

      .product-table td input {
        width: 100%;
        border: none;
        padding: 9px 10px;
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.82rem;
        outline: none;
        background: transparent;
      }

      .product-table td input:focus {
        background: #f5f8ff;
      }

      .col-name {
        width: 45%;
      }
      .col-color {
        width: 20%;
      }
      .col-qty {
        width: 17%;
      }
      .col-price {
        width: 18%;
      }

      /* Redacted / black bar row */
      .redacted-row td {
        background: #111;
        height: 28px;
        border-bottom: 2px solid #1a3a6b;
      }

      /* Summary rows */
      .summary-row {
        display: flex;
        align-items: stretch;
        border-bottom: 1px solid #1a3a6b;
      }

      .summary-row:last-child {
        border-bottom: none;
      }

      .summary-label {
        flex: 1;
        font-size: 0.85rem;
        font-weight: 400;
        color: #1a1a1a;
        padding: 9px 14px;
      }

      .summary-label.total {
        font-weight: 700;
        color: #6b1a4a;
      }

      .summary-value {
        width: 120px;
        border-left: 1px solid #1a3a6b;
        padding: 9px 12px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #1a1a1a;
      }

      .summary-input {
        width: 120px;
        border-left: 1px solid #1a3a6b;
        padding: 0;
      }

      .summary-input input {
        width: 100%;
        height: 100%;
        border: none;
        padding: 9px 12px;
        font-family: "Source Sans 3", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        outline: none;
        background: transparent;
      }

      .summary-input input:focus {
        background: #f5f8ff;
      }
    </style>
  </head>
  <body>
    <div class="form-wrapper">
      <div class="form-title">Customer Order Form</div>

      <!-- Order Number -->
      <div class="field-row">
        <label>Order Number</label>
        <input type="text" placeholder="" />
      </div>

      <!-- Order Date -->
      <div class="field-row">
        <label>Order Date</label>
        <input type="text" placeholder="" />
      </div>

      <!-- Product Table -->
      <table class="product-table">
        <thead>
          <tr>
            <th class="col-name">Product Name</th>
            <th class="col-color">Color</th>
            <th class="col-qty">Quantity</th>
            <th class="col-price">Price</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <tr>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
            <td><input type="text" /></td>
          </tr>
          <!-- Redacted / black bar -->
          <tr class="redacted-row">
            <td colspan="4"></td>
          </tr>
        </tbody>
      </table>

      <!-- Summary -->
      <div class="summary-row">
        <span class="summary-label">Subtotal</span>
        <div class="summary-input"><input type="text" /></div>
      </div>
      <div class="summary-row">
        <span class="summary-label">Tax</span>
        <div class="summary-input"><input type="text" /></div>
      </div>
      <div class="summary-row">
        <span class="summary-label">Shipping</span>
        <span class="summary-value">5.95</span>
      </div>
      <div class="summary-row">
        <span class="summary-label total">Total</span>
        <div class="summary-input"><input type="text" /></div>
      </div>
    </div>
  </body>
</html>
