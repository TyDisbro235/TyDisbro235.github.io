<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>March Madness Calendar</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #f0ece4;
        font-family: Georgia, "Times New Roman", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px 20px;
      }

      .card {
        background: #fff;
        border: 2px solid #333;
        display: inline-flex;
        align-items: stretch;
      }

      /* Left panel */
      .left-panel {
        border-right: 2px solid #333;
        padding: 20px 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 110px;
      }

      .left-panel h1 {
        font-size: 1.45rem;
        font-weight: 900;
        text-align: center;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.01em;
        color: #111;
      }

      /* Center calendar panel */
      .calendar-panel {
        border-right: 2px solid #333;
        padding: 14px 18px;
      }

      .calendar-panel h2 {
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 10px;
        color: #111;
      }

      .cal-table {
        border-collapse: collapse;
      }

      .cal-table th {
        font-size: 0.82rem;
        font-weight: 700;
        text-align: center;
        padding: 2px 8px;
        color: #111;
      }

      .cal-table td {
        font-size: 0.82rem;
        text-align: center;
        padding: 3px 8px;
        color: #111;
      }

      .cal-table td.highlight {
        background: #ffe81a;
        font-weight: 700;
      }

      /* Right panel */
      .right-panel {
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-width: 180px;
      }

      .right-panel h3 {
        font-size: 0.95rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
        color: #111;
      }

      .right-panel p {
        font-size: 0.8rem;
        text-align: center;
        line-height: 1.55;
        color: #111;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Left: March Madness -->
      <div class="left-panel">
        <h1>March<br />Madness</h1>
      </div>

      <!-- Center: Calendar -->
      <div class="calendar-panel">
        <h2>March</h2>
        <table class="cal-table">
          <thead>
            <tr>
              <th>Sun</th>
              <th>Mon</th>
              <th>Tue</th>
              <th>Wed</th>
              <th>Thu</th>
              <th>Fri</th>
              <th>Sat</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td></td>
              <td>1</td>
              <td>2</td>
              <td>3</td>
              <td>4</td>
              <td>5</td>
              <td>6</td>
            </tr>
            <tr>
              <td>7</td>
              <td>8</td>
              <td>9</td>
              <td>10</td>
              <td>11</td>
              <td>12</td>
              <td>13</td>
            </tr>
            <tr>
              <td>14</td>
              <td>15</td>
              <td class="highlight">16</td>
              <td class="highlight">17</td>
              <td class="highlight">18</td>
              <td class="highlight">19</td>
              <td class="highlight">20</td>
            </tr>
            <tr>
              <td class="highlight">21</td>
              <td class="highlight">22</td>
              <td class="highlight">23</td>
              <td class="highlight">24</td>
              <td class="highlight">25</td>
              <td class="highlight">26</td>
              <td class="highlight">27</td>
            </tr>
            <tr>
              <td class="highlight">28</td>
              <td class="highlight">29</td>
              <td class="highlight">30</td>
              <td class="highlight">31</td>
              <td></td>
              <td></td>
              <td></td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Right: Jayhawks -->
      <div class="right-panel">
        <h3>The Jayhawks</h3>
        <p>
          Hail to thee our alma mater,<br />towering toward the blue.<br />Lift
          the banner ever skyward,<br />Hail to old KU.
        </p>
      </div>
    </div>
  </body>
</html>
