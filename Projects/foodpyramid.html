<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Pyramid</title>
    <style>
      table {
        border-collapse: collapse;
        border: 1px solid black;
        margin: 0 auto;
      }

      th {
        border: 1px solid black;
        background-color: green;
        color: white;
      }

      td {
        border: 1px solid black;
        text-align: center;
      }

      caption {
        font-size: 1.5em;
        font-weight: bold;
        margin: 0.5em;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        USDA Food Pyramid
      </caption>
      <thead>
        <tr>
          <th></th>
          <th colspan="2">Serving Guidelines</th>
        </tr>
        <tr>
          <th>Food Group</th>
          <th>2005-2010</th>
          <th>2011-Present</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Dairy <br /><i>(milk, yogurt, cheese)</i></td>
          <td>2-3</td>
          <td>3-4</td>
        </tr>
        <tr>
          <td>Meat and Beans <br /><i>(beef, poultry, fish, beans)</i></td>
          <td>2-3</td>
          <td>5-6</td>
        </tr>
        <tr>
          <td>Fruits</td>
          <td>2-4</td>
          <td>2-4</td>
        </tr>
        <tr>
          <td>Vegetables</td>
          <td>3-5</td>
          <td>1-2</td>
        </tr>
        <tr>
          <td>Grains <br /><i>(bread, donuts, poptarts)</i></td>
          <td>1-2</td>
          <td>3-5</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
